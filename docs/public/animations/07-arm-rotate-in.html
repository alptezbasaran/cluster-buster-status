<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Arm Rotate In</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">arm rotate in</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1900,
  run({ arms, finish }) {
    arms.forEach((arm, i) => groupReveal(arm, {
      from: 'rotate(-160deg) scale(0.3)',
      dur: 800, delay: i * 180,
    }))
    setTimeout(finish, arms.length * 180 + 950)
  },
})
</script>
</body>
</html>
