<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Arm Stagger Scale</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">arm stagger scale</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1500,
  run({ arms, finish }) {
    arms.forEach((arm, i) => groupReveal(arm, {
      from: 'scale(0)',
      dur: 600, delay: i * 130,
      ease: 'cubic-bezier(.34,1.56,.64,1)',
    }))
    setTimeout(finish, arms.length * 130 + 750)
  },
})
</script>
</body>
</html>
