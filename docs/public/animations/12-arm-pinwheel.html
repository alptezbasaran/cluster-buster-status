<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Arm Pinwheel</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">arm pinwheel</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1700,
  run({ svg, arms, finish }) {
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height/2
    arms.forEach((arm, i) => groupReveal(arm, {
      from: `rotate(-${(i+1)*72}deg) scale(0.4)`,
      dur: 900, delay: i * 110,
      ease: 'cubic-bezier(.2,1,.3,1)',
      origin: [cx, cy],
    }))
    setTimeout(finish, arms.length * 110 + 1000)
  },
})
</script>
</body>
</html>
