<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Icon Zoom</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">icon zoom in</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1300,
  run({ svg, paths, finish }) {
    showAll(paths)
    svg.style.transformOrigin = '50% 50%'
    svg.style.transform = 'scale(0)'
    svg.style.opacity = '0'
    void svg.getBoundingClientRect()
    svg.style.transition = 'transform 900ms cubic-bezier(.34,1.56,.64,1), opacity 600ms ease'
    svg.style.transform = 'scale(1)'
    svg.style.opacity = '1'
    setTimeout(finish, 1000)
  },
})
</script>
</body>
</html>
