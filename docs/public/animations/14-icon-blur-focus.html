<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Blur Focus</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">icon blur focus</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1500,
  run({ svg, paths, raf, finish }) {
    // rAF-driven filter+opacity. iOS Safari coalesces multi-property CSS transitions
    // on the SVG element unreliably, so we drive the values frame-by-frame instead.
    showAll(paths)
    const dur = 1100, t0 = performance.now()
    function tick(now) {
      const t = Math.min(1, (now - t0) / dur)
      const e = 1 - Math.pow(1 - t, 3)
      svg.style.filter = `blur(${(14 * (1 - e)).toFixed(2)}px)`
      svg.style.opacity = String(Math.min(1, t * 1.8))
      if (t < 1) raf(tick)
      else { svg.style.filter = 'none'; svg.style.opacity = '1'; finish() }
    }
    raf(tick)
  },
})
</script>
</body>
</html>
