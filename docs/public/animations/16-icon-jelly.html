<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Jelly Settle</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">icon jelly</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1500,
  run({ svg, paths, raf, finish }) {
    showAll(paths)
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height/2
    svg.style.transformOrigin = '50% 50%'
    const stops = [[0,0,0],[0.18,1.18,0.4],[0.36,0.92,0.7],[0.55,1.06,1],[0.78,0.98,1],[1,1,1]]
    const dur = 1200, t0 = performance.now()
    function lerpAt(t) {
      for (let i = 1; i < stops.length; i++) {
        if (t <= stops[i][0]) {
          const [t0_, s0, o0] = stops[i-1], [t1_, s1, o1] = stops[i]
          const k = (t - t0_) / (t1_ - t0_ || 1)
          return [s0 + (s1 - s0) * k, o0 + (o1 - o0) * k]
        }
      }
      return [1, 1]
    }
    function tick(now) {
      const t = Math.min(1, (now - t0) / dur)
      const [s, o] = lerpAt(t)
      svg.style.transform = `scale(${s})`
      svg.style.opacity = String(o)
      if (t < 1) raf(tick)
      else { svg.style.transform = 'none'; finish() }
    }
    raf(tick)
  },
})
</script>
</body>
</html>
