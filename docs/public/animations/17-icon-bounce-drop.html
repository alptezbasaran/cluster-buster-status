<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Bounce Drop</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">icon bounce drop</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1400,
  run({ svg, paths, raf, finish }) {
    showAll(paths)
    const vb = svg.viewBox.baseVal
    const dropFrom = -vb.height
    const dur = 1200, t0 = performance.now()
    function ease(t) {
      // Custom bounce-out: drop, settle.
      if (t < 0.55) return Math.pow(t/0.55, 2)
      const k = (t - 0.55) / 0.45
      return 1 - 0.18 * Math.exp(-3*k) * Math.cos(k*9)
    }
    function tick(now) {
      const t = Math.min(1, (now - t0) / dur)
      const e = ease(t)
      svg.style.transform = `translateY(${dropFrom * (1 - e)}px)`
      svg.style.opacity = String(Math.min(1, t * 2.5))
      if (t < 1) raf(tick)
      else { svg.style.transform = 'none'; finish() }
    }
    raf(tick)
  },
})
</script>
</body>
</html>
