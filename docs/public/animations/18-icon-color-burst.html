<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Color Burst</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">icon color burst</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1300,
  run({ svg, arms, paths, finish }) {
    paths.forEach(p => { p.style.cssText = 'opacity:1; fill:#ffffff' })
    void svg.getBoundingClientRect()
    arms.forEach(arm => arm.paths.forEach(p => {
      p.style.transition = 'fill 700ms ease'
      p.style.fill = arm.color
    }))
    setTimeout(finish, 800)
  },
})
</script>
</body>
</html>
