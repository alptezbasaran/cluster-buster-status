<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Starfield Condense</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">starfield condense</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1700,
  run({ svg, arms, paths, raf, finish }) {
    paths.forEach(p => { p.style.cssText = 'opacity:0; transition: opacity 320ms ease' })
    const layer = mk('g', { 'data-temp': '' })
    svg.appendChild(layer)
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height/2
    const seeds = []
    arms.forEach(arm => arm.paths.forEach(p => {
      const b = pathBBox(p)
      const tx = b.x + b.width/2, ty = b.y + b.height/2
      for (let k = 0; k < 3; k++) {
        const ang = Math.random() * Math.PI * 2
        const r = vb.width * (0.6 + Math.random()*0.5)
        const sx = cx + Math.cos(ang) * r
        const sy = cy + Math.sin(ang) * r
        const dot = mk('circle', { cx: sx, cy: sy, r: 1.4, fill: arm.color, opacity: 0.9 })
        layer.appendChild(dot)
        seeds.push({ dot, sx, sy, tx, ty, p })
      }
    }))
    const dur = 1300, t0 = performance.now()
    let done = false, arrived = new Set()
    function tick(now) {
      const t = Math.min(1, (now - t0) / dur)
      const e = 1 - Math.pow(1 - t, 3)
      seeds.forEach(s => {
        s.dot.setAttribute('cx', s.sx + (s.tx - s.sx) * e)
        s.dot.setAttribute('cy', s.sy + (s.ty - s.sy) * e)
        s.dot.setAttribute('opacity', String(1 - e * 0.8))
        if (e > 0.85 && !arrived.has(s.p)) {
          arrived.add(s.p); s.p.style.opacity = '1'
        }
      })
      if (t < 1) raf(tick)
      else if (!done) { done = true; layer.remove(); finish() }
    }
    raf(tick)
  },
})
</script>
</body>
</html>
