<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Arm Orbit</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">arm orbit</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1800,
  run({ svg, arms, finish }) {
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height/2
    arms.forEach((arm, i) => {
      const ang = i * (Math.PI * 2 / arms.length)
      const r = Math.max(vb.width, vb.height) * 0.7
      const dx = Math.cos(ang) * r, dy = Math.sin(ang) * r
      groupReveal(arm, {
        from: `translate(${dx}px, ${dy}px) rotate(${(i*72)%360}deg)`,
        dur: 900, delay: i*100,
        origin: [cx, cy],
      })
    })
    setTimeout(finish, arms.length*100 + 1000)
  },
})
</script>
</body>
</html>
