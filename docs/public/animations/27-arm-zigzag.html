<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Arm Zigzag</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">arm zigzag</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1700,
  run({ arms, finish }) {
    arms.forEach((arm, i) => {
      const dx = i % 2 ? -120 : 120
      groupReveal(arm, {
        from: `translate(${dx}px, 0) scale(0.4)`,
        dur: 700, delay: i * 140,
      })
    })
    setTimeout(finish, arms.length*140 + 800)
  },
})
</script>
</body>
</html>
