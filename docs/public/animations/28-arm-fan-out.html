<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Arm Fan Out</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">arm fan out</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1700,
  run({ svg, arms, finish }) {
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height + 30
    arms.forEach((arm, i) => {
      const a = (i - (arms.length-1)/2) * 18
      groupReveal(arm, {
        from: `rotate(${a}deg) translate(0, 200px) scale(0.4)`,
        dur: 800, delay: i * 110,
        origin: [cx, cy],
      })
    })
    setTimeout(finish, arms.length*110 + 900)
  },
})
</script>
</body>
</html>
