<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Icon Vortex</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">icon vortex</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1500,
  run({ svg, paths, raf, finish }) {
    showAll(paths)
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height/2
    svg.style.transformOrigin = '50% 50%'
    const dur = 1300, t0 = performance.now()
    function tick(now) {
      const t = Math.min(1, (now - t0) / dur)
      const k = 1 - Math.pow(1 - t, 3)
      svg.style.transform = `rotate(${-1080 * (1 - k)}deg) scale(${0.05 + 0.95*k})`
      svg.style.opacity = String(k)
      if (t < 1) raf(tick)
      else { svg.style.transform = 'none'; finish() }
    }
    raf(tick)
  },
})
</script>
</body>
</html>
