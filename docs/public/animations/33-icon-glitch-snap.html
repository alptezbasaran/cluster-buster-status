<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Glitch Snap</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">icon glitch snap</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1300,
  run({ svg, paths, finish }) {
    showAll(paths)
    const seq = [
      { o:0.2, x:-6, y:0,  t:0 },
      { o:0,   x:0,  y:0,  t:50 },
      { o:0.6, x:8,  y:-2, t:90 },
      { o:0.1, x:-4, y:3,  t:140 },
      { o:0.9, x:6,  y:0,  t:200 },
      { o:0.3, x:-3, y:-1, t:260 },
      { o:1,   x:0,  y:0,  t:340 },
      { o:0.6, x:2,  y:0,  t:420 },
      { o:1,   x:0,  y:0,  t:480 },
    ]
    seq.forEach(s => setTimeout(() => {
      svg.style.opacity = String(s.o)
      svg.style.transform = `translate(${s.x}px, ${s.y}px)`
    }, s.t))
    setTimeout(() => { svg.style.transform = 'none'; finish() }, 700)
  },
})
</script>
</body>
</html>
