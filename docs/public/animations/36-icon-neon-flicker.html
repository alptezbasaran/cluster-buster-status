<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Neon Flicker</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">icon neon flicker</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1300,
  run({ svg, paths, finish }) {
    showAll(paths)
    const seq = [0, 0.6, 0.05, 0.8, 0.2, 1, 0.5, 0.9, 1]
    let i = 0
    function step() {
      svg.style.opacity = String(seq[i])
      i++
      if (i < seq.length) setTimeout(step, 80 + Math.random() * 70)
      else { svg.style.opacity = '1'; finish() }
    }
    step()
  },
})
</script>
</body>
</html>
