<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Radar Sweep</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">icon radar sweep</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1700,
  run({ svg, paths, raf, finish }) {
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height/2
    paths.forEach(p => p.style.cssText = 'opacity:0; transition: opacity 280ms ease')
    const layer = mk('g', { 'data-temp': '' })
    svg.appendChild(layer)
    const rmax = Math.max(vb.width, vb.height) * 0.7
    const sweep = mk('line', { x1:cx, y1:cy, x2:cx, y2:cy-rmax, stroke:'#88ffaa', 'stroke-width':1.3, opacity:0.6 })
    layer.appendChild(sweep)
    const centers = paths.map(p => {
      const b = pathBBox(p)
      let ang = (Math.atan2(b.y + b.height/2 - cy, b.x + b.width/2 - cx) * 180/Math.PI + 90 + 360) % 360
      return { p, ang }
    })
    const dur = 1500, t0 = performance.now()
    function tick(now) {
      const t = Math.min(1, (now - t0) / dur)
      const angle = t * 360
      sweep.setAttribute('transform', `rotate(${angle} ${cx} ${cy})`)
      centers.forEach(c => { if (c.ang < angle) c.p.style.opacity = '1' })
      if (t < 1) raf(tick)
      else { layer.remove(); finish() }
    }
    raf(tick)
  },
})
</script>
</body>
</html>
