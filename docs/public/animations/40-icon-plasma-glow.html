<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Plasma Glow</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">icon plasma glow</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1500,
  run({ svg, paths, raf, finish }) {
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height/2
    const glow = mk('circle', { cx, cy, r:0, fill:'#ff44aa', 'data-temp':'' })
    glow.style.opacity = '0.5'
    glow.style.filter = 'blur(14px)'
    svg.insertBefore(glow, svg.firstChild)
    paths.forEach(p => fadeIn(p, 700, 400))
    const dur = 1300, t0 = performance.now()
    function tick(now) {
      const t = Math.min(1, (now - t0) / dur)
      glow.setAttribute('r', String(t * 200))
      glow.style.opacity = String(0.5 * (1 - t * 0.7))
      if (t < 1) raf(tick)
      else { glow.remove(); finish() }
    }
    raf(tick)
  },
})
</script>
</body>
</html>
