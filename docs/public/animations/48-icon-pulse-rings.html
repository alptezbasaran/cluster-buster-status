<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Pulse Rings</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">icon pulse rings</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1500,
  run({ svg, paths, raf, finish }) {
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height/2
    paths.forEach(p => p.style.cssText = 'opacity:0; transition: opacity 280ms ease')
    const layer = mk('g', { 'data-temp': '' })
    svg.insertBefore(layer, svg.firstChild)
    const rings = []
    for (let k = 0; k < 3; k++) {
      const ring = mk('circle', { cx, cy, r:0, fill:'none', stroke:'#ffffff', 'stroke-width':0.6, opacity:0.5 })
      layer.appendChild(ring)
      rings.push({ ring, t0: k * 250 })
    }
    const centers = paths.map(p => {
      const b = pathBBox(p)
      return { p, d: Math.hypot(b.x + b.width/2 - cx, b.y + b.height/2 - cy) }
    })
    const start = performance.now()
    const maxR = Math.max(vb.width, vb.height) * 0.7
    function tick(now) {
      const elapsed = now - start
      rings.forEach(r => {
        const t = Math.max(0, (elapsed - r.t0) / 1100)
        if (t > 1) { r.ring.setAttribute('opacity', '0'); return }
        const radius = t * maxR
        r.ring.setAttribute('r', String(radius))
        r.ring.setAttribute('opacity', String(0.5 * (1 - t)))
        centers.forEach(c => { if (c.d < radius) c.p.style.opacity = '1' })
      })
      if (elapsed < 1500) raf(tick)
      else { layer.remove(); paths.forEach(p => p.style.opacity = '1'); finish() }
    }
    raf(tick)
  },
})
</script>
</body>
</html>
