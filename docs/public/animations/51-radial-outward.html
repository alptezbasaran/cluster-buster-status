<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Radial Outward</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">radial outward</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1900,
  run({ svg, paths, finish }) {
    // Center-to-outer reveal: sort paths by their centroid's distance from icon
    // center, innermost first. Each path stroke-draws in its own natural direction
    // (no reverse-direction trick — that's unreliable across browsers), but the
    // *order* of reveal moves outward from the middle in concentric waves.
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height/2
    const items = paths.map(p => {
      const b = pathBBox(p)
      const px = b.x + b.width/2, py = b.y + b.height/2
      return { p, len: p.getTotalLength(), d: Math.hypot(px - cx, py - cy) }
    }).sort((a, b) => a.d - b.d)
    items.forEach(({ p, len }) => {
      const color = getComputedStyle(p.parentNode).fill
      p.style.cssText = `opacity:1; fill:transparent; stroke:${color}; stroke-width:1.4; stroke-dasharray:${len}; stroke-dashoffset:${len}`
    })
    void svg.getBoundingClientRect()
    const stagger = 1300 / items.length
    items.forEach(({ p }, i) => {
      const delay = i * stagger
      const armColor = getComputedStyle(p.parentNode).fill
      p.style.transition = `stroke-dashoffset 600ms cubic-bezier(.2,1,.3,1) ${delay}ms, fill 350ms ease ${delay + 550}ms`
      p.style.strokeDashoffset = '0'
      setTimeout(() => { p.style.fill = armColor }, delay + 550)
    })
    setTimeout(finish, items.length * stagger + 800)
  },
})
</script>
</body>
</html>
