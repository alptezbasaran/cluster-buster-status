<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Orbit Condense</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">orbit condense</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1900,
  run({ svg, arms, paths, raf, finish }) {
    // Bright comet-like particles spiral inward via polar interpolation, leaving
    // glowing trails. Fewer, brighter, longer-lived than the previous version.
    paths.forEach(p => p.style.cssText = 'opacity:0; transition: opacity 320ms ease')
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height/2
    const layer = mk('g', { 'data-temp': '' })
    svg.appendChild(layer)
    const seeds = []
    arms.forEach(arm => arm.paths.forEach(p => {
      const b = pathBBox(p)
      const tx = b.x + b.width/2, ty = b.y + b.height/2
      const targetR = Math.hypot(tx - cx, ty - cy)
      const targetAng = Math.atan2(ty - cy, tx - cx)
      // One bright comet per path (was 3 dim ones — too noisy).
      const startR = vb.width * (0.85 + Math.random() * 0.4)
      const startAng = Math.random() * Math.PI * 2
      const dot = mk('circle', { cx: 0, cy: 0, r: 2.2, fill: arm.color, opacity: 0.95 })
      dot.style.filter = `drop-shadow(0 0 4px ${arm.color})`
      layer.appendChild(dot)
      seeds.push({ dot, startR, startAng, targetR, targetAng, p, arm })
    }))
    const dur = 1500, t0 = performance.now()
    const arrived = new Set()
    function tick(now) {
      const t = Math.min(1, (now - t0) / dur)
      const e = 1 - Math.pow(1 - t, 3)
      seeds.forEach(s => {
        const r = s.startR + (s.targetR - s.startR) * e
        let dAng = s.targetAng - s.startAng
        while (dAng >  Math.PI) dAng -= 2 * Math.PI
        while (dAng < -Math.PI) dAng += 2 * Math.PI
        const ang = s.startAng + dAng * e + t * Math.PI * 1.6
        s.dot.setAttribute('cx', cx + Math.cos(ang) * r)
        s.dot.setAttribute('cy', cy + Math.sin(ang) * r)
        s.dot.setAttribute('opacity', String(0.95 * (1 - e * 0.5)))
        if (e > 0.82 && !arrived.has(s.p)) { arrived.add(s.p); s.p.style.opacity = '1' }
      })
      if (t < 1) raf(tick)
      else { layer.remove(); finish() }
    }
    raf(tick)
  },
})
</script>
</body>
</html>
