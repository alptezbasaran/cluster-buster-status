<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Supernova Ignition</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">supernova ignition</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1700,
  run({ svg, paths, raf, finish }) {
    // Brief white flash at center, then an orange shock ring expands outward;
    // arms ignite in distance order as the shock passes them.
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height/2
    paths.forEach(p => p.style.cssText = 'opacity:0; transition: opacity 280ms ease')
    const layer = mk('g', { 'data-temp': '' })
    svg.appendChild(layer)
    const flash = mk('circle', { cx, cy, r: 0, fill: '#ffffff', opacity: 0.9 })
    flash.style.filter = 'blur(8px)'
    const ring  = mk('circle', { cx, cy, r: 0, fill: 'none', stroke: '#ff8844', 'stroke-width': 1.4, opacity: 0.7 })
    layer.appendChild(flash); layer.appendChild(ring)
    const items = paths.map(p => {
      const b = pathBBox(p)
      return { p, d: Math.hypot(b.x + b.width/2 - cx, b.y + b.height/2 - cy) }
    })
    const FLASH = 280, RING = 1100, dur = FLASH + RING
    const rmax = Math.max(vb.width, vb.height) * 0.7
    const t0 = performance.now()
    function tick(now) {
      const elapsed = now - t0
      if (elapsed < FLASH) {
        const t = elapsed / FLASH
        flash.setAttribute('r', String(t * 60))
      } else if (elapsed < dur) {
        const t = (elapsed - FLASH) / RING
        flash.setAttribute('opacity', String(0.7 * (1 - t)))
        flash.setAttribute('r', String(60 + t * 30))
        const r = t * rmax
        ring.setAttribute('r', String(r))
        ring.setAttribute('opacity', String(0.7 * (1 - t * 0.7)))
        items.forEach(it => { if (it.d < r) it.p.style.opacity = '1' })
      }
      if (elapsed < dur) raf(tick)
      else { layer.remove(); finish() }
    }
    raf(tick)
  },
})
</script>
</body>
</html>
