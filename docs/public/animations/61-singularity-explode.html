<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Singularity Explode</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">singularity explode</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1700,
  run({ svg, arms, paths, raf, finish }) {
    // Every path emerges from a single point at icon center, translating outward
    // to its true position while scaling 0→1. Reads as a "big bang" of arms.
    const vb = svg.viewBox.baseVal
    const cx = vb.x + vb.width/2, cy = vb.y + vb.height/2
    arms.forEach(arm => arm.paths.forEach(p => {
      const b = pathBBox(p)
      const px = b.x + b.width/2, py = b.y + b.height/2
      const dx = cx - px, dy = cy - py
      p.style.cssText = `opacity:0; transform: translate(${dx.toFixed(2)}px, ${dy.toFixed(2)}px) scale(0); transform-origin: ${px}px ${py}px`
    }))
    void svg.getBoundingClientRect()
    const items = paths.map(p => {
      const b = pathBBox(p)
      const px = b.x + b.width/2, py = b.y + b.height/2
      return { p, d: Math.hypot(px - cx, py - cy) }
    }).sort((a, b) => a.d - b.d)
    items.forEach(({ p }, i) => {
      const delay = i * 30
      p.style.transition = `transform 800ms cubic-bezier(.2,1.1,.3,1) ${delay}ms, opacity 500ms ease ${delay}ms`
      p.style.transform = 'translate(0, 0) scale(1)'
      p.style.opacity = '1'
    })
    setTimeout(finish, items.length * 30 + 900)
  },
})
</script>
</body>
</html>
