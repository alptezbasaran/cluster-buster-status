<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Shatter Assemble</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">shatter assemble</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox } from '../lib/runtime.js'
anim({
  hold: 1700,
  run({ svg, paths, finish }) {
    // Paths arrive from random off-canvas positions with rotation. Per-path origin
    // means each piece flies in at its own angle — much more chaotic than
    // 49-magnetic-snap which used small straight offsets.
    paths.forEach(p => {
      const b = pathBBox(p)
      const px = b.x + b.width/2, py = b.y + b.height/2
      const ang = Math.random() * Math.PI * 2
      const r = 220 + Math.random() * 140
      const dx = Math.cos(ang) * r, dy = Math.sin(ang) * r
      const rot = (Math.random() - 0.5) * 540
      p.style.cssText = `opacity:0; transform: translate(${dx.toFixed(1)}px, ${dy.toFixed(1)}px) rotate(${rot.toFixed(1)}deg) scale(0.4); transform-origin: ${px}px ${py}px`
    })
    void svg.getBoundingClientRect()
    paths.forEach((p, i) => {
      const delay = i * 25
      p.style.transition = `transform 850ms cubic-bezier(.2,1.05,.3,1) ${delay}ms, opacity 500ms ease ${delay}ms`
      p.style.transform = 'translate(0,0) rotate(0) scale(1)'
      p.style.opacity = '1'
    })
    setTimeout(finish, paths.length * 25 + 950)
  },
})
</script>
</body>
</html>
