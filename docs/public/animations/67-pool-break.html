<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Pool Break</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">pool break</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox, hideAll, rng, bake, pathPoint, iconCenter, ring, chip } from '../lib/runtime.js'
anim({
  hold: 1700,
  run({ svg, arms, paths, raf, finish }) {
    // A cue ball breaks the cluster: arms scatter with spin under table
    // friction, sit for a beat, then springs re-cluster them. Amber takes the
    // hardest knock and wobbles home last.
    showAll(paths)
    const R = rng(67)
    const C = iconCenter(arms)
    const vb = svg.viewBox.baseVal
    const bodies = arms.map(arm => {
      const b = arm.el.getBBox()
      const ax = b.x + b.width / 2, ay = b.y + b.height / 2
      let nx = ax - C.cx, ny = ay - C.cy
      const n = Math.hypot(nx, ny) || 1
      nx /= n; ny /= n
      const hard = arm.name === 'amber' ? 1.6 : 0.85 + R() * 0.3
      return { arm, ox: ax, oy: ay, x: 0, y: 0, rot: 0,
               vx: nx * 150 * hard, vy: ny * 150 * hard,
               vr: (R() - 0.5) * 160 * hard, delay: 0, vsx: 0, vsy: 0, vsr: 0 }
    })
    const order = bodies.slice().sort((a, b) => (a.arm.name === 'amber') - (b.arm.name === 'amber'))
    order.forEach((b, i) => { b.delay = i * 0.09 + (b.arm.name === 'amber' ? 0.25 : 0) })
    const cue = mk('circle', { cx: vb.x - 20, cy: vb.y + vb.height + 20, r: 7.5, fill: '#fff', 'data-temp': '' })
    svg.appendChild(cue)
    const T_CUE = 0.38, T_SIT = 1.25
    let phase = 0
    const t0 = performance.now()
    let last = t0
    function tick(now) {
      const t = (now - t0) / 1000
      const dt = Math.min(0.032, (now - last) / 1000); last = now
      if (t < T_CUE) {
        const e = (t / T_CUE) * (t / T_CUE)
        cue.setAttribute('cx', String(vb.x - 20 + (C.cx - (vb.x - 20)) * e))
        cue.setAttribute('cy', String(vb.y + vb.height + 20 + (C.cy - (vb.y + vb.height + 20)) * e))
      } else if (phase === 0) {
        phase = 1
        cue.setAttribute('cx', String(C.cx)); cue.setAttribute('cy', String(C.cy))
        ring(svg, C.cx, C.cy, { r1: 95, ms: 550, width: 2 })
        const fl = mk('circle', { cx: C.cx, cy: C.cy, r: 10, fill: '#fff', opacity: 0.9, 'data-temp': '' })
        svg.appendChild(fl)
        setTimeout(() => fl.remove(), 90)
      }
      if (phase >= 1) {
        bodies.forEach(b => {
          if (t < T_SIT + b.delay) {
            const f = Math.exp(-3.4 * dt)
            b.vx *= f; b.vy *= f; b.vr *= f
            b.x += b.vx * dt; b.y += b.vy * dt; b.rot += b.vr * dt
          } else {
            b.vsx += (-60 * b.x - 7 * b.vsx) * dt
            b.vsy += (-60 * b.y - 7 * b.vsy) * dt
            b.vsr += (-60 * b.rot - 7 * b.vsr) * dt
            b.x += b.vsx * dt; b.y += b.vsy * dt; b.rot += b.vsr * dt
          }
          b.arm.el.style.transformOrigin = `${b.ox}px ${b.oy}px`
          b.arm.el.style.transform = `translate(${b.x.toFixed(2)}px, ${b.y.toFixed(2)}px) rotate(${b.rot.toFixed(2)}deg)`
        })
        if (t > T_SIT) cue.setAttribute('opacity', String(Math.max(0, 1 - (t - T_SIT) / 0.5)))
      }
      const done = t > T_SIT + 0.4 && bodies.every(b =>
        Math.abs(b.x) < 0.25 && Math.abs(b.y) < 0.25 && Math.abs(b.rot) < 0.3 &&
        Math.abs(b.vsx) + Math.abs(b.vsy) < 1.2)
      if (done) {
        bodies.forEach(b => { b.arm.el.style.transform = '' })
        chip(svg, 'break → re-cluster')
        finish()
        return
      }
      raf(tick)
    }
    raf(tick)
  },
})
</script>
</body>
</html>
