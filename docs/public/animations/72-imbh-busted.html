<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — IMBH Busted</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">imbh busted</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox, hideAll, rng, bake, pathPoint, iconCenter, ring, chip } from '../lib/runtime.js'
anim({
  hold: 2000,
  run({ svg, arms, paths, raf, finish }) {
    // A radar sweep finds nothing. Then the cluster gets BUSTED apart — and
    // there it is: an IMBH that was hiding inside the amber arm all along.
    // The arms re-cluster around the now-visible black hole.
    showAll(paths)
    const R = rng(72)
    const C = iconCenter(arms)
    const vb = svg.viewBox.baseVal
    const amber = arms.find(a => a.name === 'amber')
    // the hidden IMBH sits at amber's inner core, painted UNDER the arms
    const inner = amber.paths.slice().sort((a, b) => {
      const A = pathBBox(a), B = pathBBox(b)
      return A.width * A.height - B.width * B.height
    })[0]
    let core = pathPoint(inner, 0), dBest = 1e9
    for (let u = 0; u <= 1.001; u += 0.25) {
      const pt = pathPoint(inner, u)
      const d = Math.hypot(pt.x - C.cx, pt.y - C.cy)
      if (d < dBest) { dBest = d; core = pt }
    }
    const bh = mk('g', { 'data-temp': '' })
    bh.appendChild(mk('circle', { cx: core.x, cy: core.y, r: 6.5, fill: '#000' }))
    bh.appendChild(mk('circle', { cx: core.x, cy: core.y, r: 6.5, fill: 'none', stroke: amber.color, 'stroke-width': 1.4 }))
    const halo = mk('circle', { cx: core.x, cy: core.y, r: 10, fill: 'none', stroke: amber.color, 'stroke-width': 0.6, opacity: 0.35 })
    bh.appendChild(halo)
    svg.insertBefore(bh, svg.firstChild)
    // radar sweep
    const sweep = mk('g', { 'data-temp': '' })
    const RR = Math.max(vb.width, vb.height) * 0.5
    sweep.appendChild(mk('path', {
      d: `M ${C.cx} ${C.cy} L ${C.cx + RR} ${C.cy} A ${RR} ${RR} 0 0 0 ${(C.cx + RR * Math.cos(-0.7)).toFixed(1)} ${(C.cy + RR * Math.sin(-0.7)).toFixed(1)} Z`,
      fill: '#9ad', opacity: 0.1,
    }))
    sweep.appendChild(mk('line', { x1: C.cx, y1: C.cy, x2: C.cx + RR, y2: C.cy, stroke: '#9ad', 'stroke-width': 0.8, opacity: 0.7 }))
    svg.appendChild(sweep)
    const verdict = mk('text', {
      x: C.cx, y: vb.y + 26, 'text-anchor': 'middle', fill: '#7a8',
      'font-size': '9', 'letter-spacing': '2', 'font-family': 'system-ui, sans-serif', opacity: 0, 'data-temp': '',
    })
    verdict.textContent = 'NO SOURCE DETECTED'
    svg.appendChild(verdict)
    const bodies = arms.map((arm, i) => {
      const b = arm.el.getBBox()
      const ax = b.x + b.width / 2, ay = b.y + b.height / 2
      const n = Math.hypot(ax - C.cx, ay - C.cy) || 1
      return { arm, ox: ax, oy: ay, nx: (ax - C.cx) / n, ny: (ay - C.cy) / n,
               hard: 0.9 + R() * 0.25, x: 0, y: 0, vx: 0, vy: 0, mode: 0, delay: i * 0.07 }
    })
    const word = 'BUSTED!'
    const letters = []
    const T_SWEEP = 1.25, T_VERDICT = 2.0, T_BUST = 2.35
    let busted = false, reclustered = false, done = false
    const t0 = performance.now()
    let last = t0
    function tick(now) {
      const t = (now - t0) / 1000
      const dt = Math.min(0.032, (now - last) / 1000); last = now
      if (t < T_SWEEP) {
        sweep.style.transformOrigin = `${C.cx}px ${C.cy}px`
        sweep.style.transform = `rotate(${(t / T_SWEEP * 360).toFixed(1)}deg)`
      } else if (t < T_BUST) {
        sweep.setAttribute('opacity', String(Math.max(0, 1 - (t - T_SWEEP) / 0.25)))
        const vin = Math.min(1, (t - T_SWEEP) / 0.25)
        const vout = t > T_VERDICT - 0.25 ? Math.max(0, (T_VERDICT - t) / 0.25 + 1) : 1
        verdict.setAttribute('opacity', String(vin * Math.min(1, Math.max(0, vout))))
      } else if (!busted) {
        busted = true
        sweep.remove()
        verdict.remove()
        ring(svg, C.cx, C.cy, { r1: 90, ms: 500, width: 2 })
        ring(svg, core.x, core.y, { r1: 40, ms: 450, color: amber.color, width: 1.4 })
        bodies.forEach(b => { b.vx = b.nx * 130 * b.hard; b.vy = b.ny * 130 * b.hard; b.mode = 1 })
        const n = word.length
        word.split('').forEach((ch, i) => {
          const x = C.cx + (i - (n - 1) / 2) * 17
          const el = mk('text', {
            x, y: vb.y + 40, 'text-anchor': 'middle', fill: '#fff',
            'font-size': '26', 'font-weight': '900', 'font-family': 'system-ui, sans-serif', 'data-temp': '',
          })
          el.textContent = ch
          el.style.cssText = `opacity:0; transform: scale(2.6); transform-origin: ${x}px ${vb.y + 40}px`
          svg.appendChild(el)
          letters.push(el)
        })
        void svg.getBoundingClientRect()
        letters.forEach((el, i) => {
          el.style.transition = `transform 260ms cubic-bezier(.2,1.6,.4,1) ${i * 70}ms, opacity 160ms ease ${i * 70}ms`
          el.style.transform = 'scale(1)'
          el.style.opacity = '1'
        })
      }
      if (busted) {
        const w = t - T_BUST
        if (w < 1.0) {
          svg.style.transformOrigin = '50% 50%'
          svg.style.transform = `rotate(${(Math.sin(w * 60) * 0.7 * (1 - w)).toFixed(3)}deg)`
        } else svg.style.transform = ''
        bodies.forEach(b => {
          if (w < 0.7 + b.delay) {
            const f = Math.exp(-4.2 * dt)
            b.vx *= f; b.vy *= f
            b.x += b.vx * dt; b.y += b.vy * dt
          } else {
            if (b.mode === 1) { b.mode = 2; b.vx = 0; b.vy = 0 }
            b.vx += (-65 * b.x - 7.5 * b.vx) * dt
            b.vy += (-65 * b.y - 7.5 * b.vy) * dt
            b.x += b.vx * dt; b.y += b.vy * dt
          }
          b.arm.el.style.transformOrigin = `${b.ox}px ${b.oy}px`
          b.arm.el.style.transform = `translate(${b.x.toFixed(2)}px, ${b.y.toFixed(2)}px)`
        })
        if (!reclustered && w > 0.75) {
          reclustered = true
          svg.appendChild(bh)
          letters.forEach((el, i) => {
            el.style.transition = `opacity 300ms ease ${i * 40}ms`
            el.style.opacity = '0'
          })
        }
        halo.setAttribute('r', String(10 + Math.sin(t * 5) * 1.2))
        const settled = w > 1.3 && bodies.every(b =>
          Math.abs(b.x) < 0.3 && Math.abs(b.y) < 0.3 && Math.abs(b.vx) + Math.abs(b.vy) < 1.5)
        if (settled && !done) {
          done = true
          bodies.forEach(b => { b.arm.el.style.transform = '' })
          ring(svg, core.x, core.y, { r1: 22, ms: 600, color: amber.color, width: 1 })
          chip(svg, 'the cluster hid an IMBH')
          finish()
          return
        }
      }
      raf(tick)
    }
    raf(tick)
  },
})
</script>
</body>
</html>
