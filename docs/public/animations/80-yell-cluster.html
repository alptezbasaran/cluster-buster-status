<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — CLUSTERRR!</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">yell cluster</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox, hideAll, rng, bake, pathPoint, iconCenter, ring, chip } from '../lib/runtime.js'
anim({
  hold: 1800,
  run({ svg, arms, paths, raf, finish }) {
    // Each piled letter makes the icon dip and the arms huddle one notch
    // tighter toward the center — CLUSTERRR! — then the '!' slams, shockwave,
    // and the arms burst back out with overshoot.
    showAll(paths)
    const C = iconCenter(arms)
    const vb = svg.viewBox.baseVal
    const word = 'CLUSTERRR!'
    const n = word.length
    const homes = arms.map(arm => {
      const b = arm.el.getBBox()
      return { arm, dx: b.x + b.width / 2 - C.cx, dy: b.y + b.height / 2 - C.cy }
    })
    const letters = []
    const spawnAt = i => 0.3 + i * 0.15
    let spawned = 0, landed = 0
    let f = 0, fv = 0, T = 0, dip = 0, dipV = 0, burstAt = -1, tremor = -1, done = false
    const t0 = performance.now()
    let last = t0
    function tick(now) {
      const t = (now - t0) / 1000
      const dt = Math.min(0.032, (now - last) / 1000); last = now
      while (spawned < n && t > spawnAt(spawned)) {
        const i = spawned++
        const ch = word[i]
        const x = C.cx + (i - (n - 1) / 2) * 16
        const el = mk('text', {
          x, y: vb.y + 42, 'text-anchor': 'middle', fill: '#fff',
          'font-size': ch === '!' ? '32' : '24', 'font-weight': '900',
          'font-family': 'system-ui, sans-serif', 'data-temp': '',
        })
        el.textContent = ch
        el.style.cssText = `opacity:0; transform: scale(2.4); transform-origin: ${x}px ${vb.y + 42}px`
        svg.appendChild(el)
        void el.getBoundingClientRect()
        el.style.transition = 'transform 200ms cubic-bezier(.2,1.7,.4,1), opacity 130ms ease'
        el.style.transform = 'scale(1)'
        el.style.opacity = '1'
        letters.push(el)
      }
      while (landed < n && t > spawnAt(landed) + 0.21) {
        const i = landed++
        dipV += i === n - 1 ? 55 : 26
        if (i < n - 1) T += 0.026
        if (i === n - 1) {
          tremor = t
          burstAt = t + 0.35
          ring(svg, C.cx, C.cy, { r1: 95, ms: 550, width: 2 })
          ring(svg, C.cx, C.cy, { r1: 55, ms: 420, color: '#fbb040', width: 1.2 })
        }
      }
      if (burstAt > 0 && t > burstAt && T > 0) { T = 0; fv -= 1.5 }
      const stiff = T > 0 || burstAt < 0 ? 90 : 70
      const damp = T > 0 || burstAt < 0 ? 12 : 7
      fv += (-stiff * (f - T) - damp * fv) * dt
      f += fv * dt
      homes.forEach(h => {
        h.arm.el.style.transform = `translate(${(-f * h.dx).toFixed(2)}px, ${(-f * h.dy).toFixed(2)}px)`
      })
      dipV += (-200 * dip - 12 * dipV) * dt
      dip += dipV * dt
      const tr = tremor > 0 ? Math.sin((t - tremor) * 65) * 0.8 * Math.max(0, 1 - (t - tremor) / 0.45) : 0
      svg.style.transformOrigin = '50% 50%'
      svg.style.transform = `translate(0px, ${(dip * 0.06).toFixed(2)}px) rotate(${tr.toFixed(3)}deg)`
      if (burstAt > 0 && t > burstAt + 0.6 && !done) {
        done = true
        letters.forEach((el, i) => {
          el.style.transition = `opacity 280ms ease ${i * 30}ms`
          el.style.opacity = '0'
        })
      }
      if (done && Math.abs(f) < 0.004 && Math.abs(fv) < 0.03) {
        homes.forEach(h => { h.arm.el.style.transform = '' })
        svg.style.transform = ''
        chip(svg, 'call the cluster')
        finish()
        return
      }
      raf(tick)
    }
    raf(tick)
  },
})
</script>
</body>
</html>
