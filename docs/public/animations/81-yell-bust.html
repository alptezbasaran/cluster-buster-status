<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — BUST!</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">yell bust</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox, hideAll, rng, bake, pathPoint, iconCenter, ring, chip } from '../lib/runtime.js'
anim({
  hold: 1700,
  run({ svg, arms, paths, raf, finish }) {
    // Anticipation squash... BUST! — the arms blast apart and freeze mid-air
    // for a comedy beat, then sheepishly ease back into the spiral.
    showAll(paths)
    const R = rng(81)
    const C = iconCenter(arms)
    const vb = svg.viewBox.baseVal
    const word = 'BUST!'
    const bodies = arms.map(arm => {
      const b = arm.el.getBBox()
      const ax = b.x + b.width / 2, ay = b.y + b.height / 2
      const d = Math.hypot(ax - C.cx, ay - C.cy) || 1
      return { arm, ox: ax, oy: ay, nx: (ax - C.cx) / d, ny: (ay - C.cy) / d,
               hard: 0.85 + R() * 0.35, x: 0, y: 0, rot: 0, vx: 0, vy: 0, vr: 0 }
    })
    const letters = []
    const T_SQ = 0.5, tB = 1.12
    let q = 0, qv = 0, blasted = false, homing = false, doneLetters = false
    const t0 = performance.now()
    let last = t0
    function tick(now) {
      const t = (now - t0) / 1000
      const dt = Math.min(0.032, (now - last) / 1000); last = now
      if (t < T_SQ) {
        q = t / T_SQ
      } else if (!blasted) {
        const idx = Math.floor((t - 0.55) / 0.09)
        while (letters.length < word.length && letters.length <= idx) {
          const i = letters.length
          const ch = word[i]
          const x = C.cx + (i - (word.length - 1) / 2) * 19
          const el = mk('text', {
            x, y: vb.y + 44, 'text-anchor': 'middle', fill: '#fff',
            'font-size': ch === '!' ? '34' : '30', 'font-weight': '900',
            'font-family': 'system-ui, sans-serif', 'data-temp': '',
          })
          el.textContent = ch
          el.style.cssText = `opacity:0; transform: scale(3); transform-origin: ${x}px ${vb.y + 44}px`
          svg.appendChild(el)
          void el.getBoundingClientRect()
          el.style.transition = 'transform 160ms cubic-bezier(.2,1.5,.4,1), opacity 110ms ease'
          el.style.transform = 'scale(1)'
          el.style.opacity = '1'
          letters.push(el)
        }
        if (t > tB) {
          blasted = true
          qv = -9
          ring(svg, C.cx, C.cy, { r1: 100, ms: 520, width: 2 })
          bodies.forEach(b => {
            b.vx = b.nx * 165 * b.hard
            b.vy = b.ny * 165 * b.hard
            b.vr = (R() - 0.5) * 80 * b.hard
          })
        }
      }
      if (blasted) {
        const w = t - tB
        qv += (-120 * q - 9 * qv) * dt
        q += qv * dt
        if (w < 0.4) {
          svg.style.transformOrigin = '50% 50%'
          const tr = Math.sin(w * 70) * 0.9 * (1 - w / 0.4)
          svg.style.transform = `scale(${(1 + 0.05 * q).toFixed(4)}, ${(1 - 0.08 * q).toFixed(4)}) rotate(${tr.toFixed(3)}deg)`
        } else {
          svg.style.transform = `scale(${(1 + 0.05 * q).toFixed(4)}, ${(1 - 0.08 * q).toFixed(4)})`
        }
        if (!homing && w > 0.95) {
          homing = true
          bodies.forEach(b => { b.vx = 0; b.vy = 0; b.vr = 0 })
        }
        bodies.forEach(b => {
          if (!homing) {
            const fr = Math.exp(-4.0 * dt)
            b.vx *= fr; b.vy *= fr; b.vr *= fr
            b.x += b.vx * dt; b.y += b.vy * dt; b.rot += b.vr * dt
          } else {
            b.vx += (-26 * b.x - 10.5 * b.vx) * dt
            b.vy += (-26 * b.y - 10.5 * b.vy) * dt
            b.vr += (-26 * b.rot - 10.5 * b.vr) * dt
            b.x += b.vx * dt; b.y += b.vy * dt; b.rot += b.vr * dt
          }
          b.arm.el.style.transformOrigin = `${b.ox}px ${b.oy}px`
          b.arm.el.style.transform = `translate(${b.x.toFixed(2)}px, ${b.y.toFixed(2)}px) rotate(${b.rot.toFixed(2)}deg)`
        })
        if (homing && !doneLetters) {
          doneLetters = true
          letters.forEach((el, i) => {
            el.style.transition = `opacity 320ms ease ${i * 40}ms`
            el.style.opacity = '0'
          })
        }
        const settled = homing && bodies.every(b =>
          Math.abs(b.x) < 0.3 && Math.abs(b.y) < 0.3 && Math.abs(b.rot) < 0.3 &&
          Math.abs(b.vx) + Math.abs(b.vy) < 1.2)
        if (settled) {
          bodies.forEach(b => { b.arm.el.style.transform = '' })
          svg.style.transform = ''
          chip(svg, '...and bust it')
          finish()
          return
        }
      } else {
        svg.style.transformOrigin = '50% 50%'
        svg.style.transform = `scale(${(1 + 0.05 * q).toFixed(4)}, ${(1 - 0.08 * q).toFixed(4)})`
      }
      raf(tick)
    }
    raf(tick)
  },
})
</script>
</body>
</html>
