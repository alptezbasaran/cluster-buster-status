<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Strand Peel</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">strand peel</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox, hideAll, rng, bake, pathPoint, iconCenter, ring, chip } from '../lib/runtime.js'
anim({
  hold: 1700,
  run({ svg, arms, paths, raf, finish }) {
    // Amber's strands peel off one by one — outermost first — hover fanned
    // with a gentle bob, then re-laminate innermost-first, each landing with
    // a click. The arm is a laminate of swooshes.
    showAll(paths)
    const C = iconCenter(arms)
    const amber = arms.find(a => a.name === 'amber')
    arms.forEach(a => { if (a !== amber) a.paths.forEach(p => { p.style.cssText = 'opacity:0.5; transition: opacity 400ms ease' }) })
    const strands = amber.paths.slice().sort((a, b) => {
      const A = pathBBox(a), B = pathBBox(b)
      return B.width * B.height - A.width * A.height
    })
    const n = strands.length
    const st = strands.map((p, j) => {
      const b = pathBBox(p)
      const x = b.x + b.width / 2, y = b.y + b.height / 2
      const d = Math.hypot(x - C.cx, y - C.cy) || 1
      return { p, j, x, y, nx: (x - C.cx) / d, ny: (y - C.cy) / d,
               off: 10 + j * 4, rot: 6 + j * 2.5, g: 0, gv: 0, sprung: false, snap: false }
    })
    const peelAt = j => 0.25 + j * 0.18
    const T_PEELED = 0.25 + (n - 1) * 0.18 + 0.4
    const T_HOLD = T_PEELED + 0.45
    const retAt = j => T_HOLD + (n - 1 - j) * 0.18
    let done = false
    const t0 = performance.now()
    let last = t0
    function tick(now) {
      const t = (now - t0) / 1000
      const dt = Math.min(0.032, (now - last) / 1000); last = now
      let alive = false
      st.forEach(s => {
        if (t < retAt(s.j)) {
          const u = Math.min(1, Math.max(0, (t - peelAt(s.j)) / 0.4))
          s.g = u * u * (3 - 2 * u)
          if (t > T_PEELED) s.g += Math.sin(t * 4 + s.j * 1.7) * 0.035
        } else {
          if (!s.sprung) { s.sprung = true; s.gv = 0 }
          s.gv += (-140 * s.g - 9 * s.gv) * dt
          s.g += s.gv * dt
          if (!s.snap && s.g <= 0.02 && s.gv < 0) {
            s.snap = true
            ring(svg, s.x, s.y, { r1: 10, ms: 260, color: amber.color, width: 0.9 })
          }
          if (Math.abs(s.g) > 0.01 || Math.abs(s.gv) > 0.1) alive = true
        }
        const o = s.off * s.g
        s.p.style.transformOrigin = `${C.cx}px ${C.cy}px`
        s.p.style.transform = `translate(${(s.nx * o).toFixed(2)}px, ${(s.ny * o).toFixed(2)}px) rotate(${(s.rot * s.g).toFixed(2)}deg)` + bake(s.p)
      })
      if (t > retAt(0) + 0.3 && !alive && !done) {
        done = true
        st.forEach(s => { s.p.style.transform = '' })
        arms.forEach(a => a.paths.forEach(p => { p.style.opacity = '1' }))
        chip(svg, 'laminate of swooshes')
        finish()
        return
      }
      raf(tick)
    }
    raf(tick)
  },
})
</script>
</body>
</html>
