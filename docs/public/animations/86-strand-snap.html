<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cluster Buster — Strand Snap</title>
<link rel="stylesheet" href="../lib/page.css">
</head>
<body>
<div class="title">strand snap</div>
<div id="stage"></div>
<script type="module">
import { anim, mk, fadeIn, ARMS, ARM_COLORS, NS, groupReveal, showAll, pathBBox, hideAll, rng, bake, pathPoint, iconCenter, ring, chip } from '../lib/runtime.js'
anim({
  hold: 1600,
  run({ svg, arms, paths, raf, finish }) {
    // The innermost strand of every arm gets drawn out taut like a bowstring,
    // trembling under tension — then they whip-crack home one by one around
    // the circle, each snap kicking its parent arm.
    showAll(paths)
    const C = iconCenter(arms)
    const units = arms.map(arm => {
      const p = arm.paths.slice().sort((a, b) => {
        const A = pathBBox(a), B = pathBBox(b)
        return A.width * A.height - B.width * B.height
      })[0]
      const b = pathBBox(p)
      const x = b.x + b.width / 2, y = b.y + b.height / 2
      const d = Math.hypot(x - C.cx, y - C.cy) || 1
      const ab = arm.el.getBBox()
      return { arm, p, x, y, nx: (x - C.cx) / d, ny: (y - C.cy) / d,
               ox: ab.x + ab.width / 2, oy: ab.y + ab.height / 2,
               ang: Math.atan2(y - C.cy, x - C.cx),
               g: 0, gv: 0, as: 0, av: 0, sprung: false, snapped: false }
    })
    units.slice().sort((a, b) => a.ang - b.ang).forEach((u, i) => { u.snapAt = 1.25 + i * 0.28 })
    let done = false
    const t0 = performance.now()
    let last = t0
    function tick(now) {
      const t = (now - t0) / 1000
      const dt = Math.min(0.032, (now - last) / 1000); last = now
      let alive = false
      units.forEach(un => {
        let trem = 0
        if (t < un.snapAt) {
          const u = Math.min(1, Math.max(0, (t - 0.3) / 0.7))
          un.g = u * u * (3 - 2 * u)
          trem = un.g * 0.8
        } else {
          if (!un.sprung) { un.sprung = true; un.gv = 0 }
          un.gv += (-260 * un.g - 11 * un.gv) * dt
          un.g += un.gv * dt
          if (!un.snapped && un.g <= 0 && un.gv < 0) {
            un.snapped = true
            ring(svg, un.x, un.y, { r1: 13, ms: 280, width: 1 })
            un.av -= 35
          }
          if (Math.abs(un.g) > 0.01 || Math.abs(un.gv) > 0.1) alive = true
        }
        un.av += (-120 * un.as - 9 * un.av) * dt
        un.as += un.av * dt
        if (Math.abs(un.as) > 0.05) alive = true
        const jx = trem > 0 ? Math.sin(t * 70 + un.ang * 5) * 0.7 * trem : 0
        const o = un.g * 26
        un.p.style.transform = `translate(${(un.nx * o - un.ny * jx).toFixed(2)}px, ${(un.ny * o + un.nx * jx).toFixed(2)}px)` + bake(un.p)
        un.arm.el.style.transform = `translate(${(un.nx * un.as).toFixed(2)}px, ${(un.ny * un.as).toFixed(2)}px)`
      })
      if (t > 1.25 + 5 * 0.28 && !alive && !done) {
        done = true
        units.forEach(un => { un.p.style.transform = ''; un.arm.el.style.transform = '' })
        chip(svg, 'whip-crack recoil')
        finish()
        return
      }
      raf(tick)
    }
    raf(tick)
  },
})
</script>
</body>
</html>
